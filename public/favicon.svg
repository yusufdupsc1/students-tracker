<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE5B4"/>
      <stop offset="40%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#811B22"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#E63946" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#811B22" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes rise {
        0% { transform: translateY(8px); }
        50% { transform: translateY(2px); }
        100% { transform: translateY(8px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes rotateRays {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes rayPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .sun-body {
        animation: rise 4s ease-in-out infinite;
        transform-origin: 32px 38px;
      }
      .sun-glow {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: 32px 38px;
      }
      .rays {
        animation: rotateRays 20s linear infinite;
        transform-origin: 32px 38px;
      }
      .ray {
        animation: rayPulse 2s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#0F172A" rx="12"/>

  <!-- Glow behind sun -->
  <circle class="sun-glow" cx="32" cy="38" r="22" fill="url(#glowGrad)" filter="url(#glow)"/>

  <!-- Rays -->
  <g class="rays">
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(45 32 38)"/>
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(90 32 38)"/>
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(135 32 38)"/>
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(180 32 38)"/>
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(225 32 38)"/>
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(270 32 38)"/>
    <line class="ray" x1="32" y1="10" x2="32" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(315 32 38)"/>
  </g>

  <!-- Sun body -->
  <circle class="sun-body" cx="32" cy="38" r="14" fill="url(#sunGrad)" filter="url(#glow)"/>

  <!-- Inner highlight -->
  <circle class="sun-body" cx="28" cy="34" r="5" fill="#FFE5B4" opacity="0.4"/>
</svg>
